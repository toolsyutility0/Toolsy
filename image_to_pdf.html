<style>

@keyframes spin{

<script>

const uploadBox = document.getElementById('uploadBox');
const fileInput = document.getElementById('fileInput');
const previewGrid = document.getElementById('previewGrid');

const watermarkText = document.getElementById('watermarkText');
const watermarkScale = document.getElementById('watermarkScale');
const watermarkOpacity = document.getElementById('watermarkOpacity');

const scaleValue = document.getElementById('scaleValue');
const opacityValue = document.getElementById('opacityValue');

const pageNumbers = document.getElementById('pageNumbers');

const pdfPreview = document.getElementById('pdfPreview');

const prevPage = document.getElementById('prevPage');
const nextPage = document.getElementById('nextPage');

const generateBtn = document.getElementById('generateBtn');
const downloadBtn = document.getElementById('downloadBtn');

const spinnerOverlay = document.getElementById('spinnerOverlay');

const themeBtn = document.getElementById('themeBtn');

const pageSize = document.getElementById('pageSize');
const orientation = document.getElementById('orientation');
const fitMode = document.getElementById('fitMode');

const marginSlider = document.getElementById('marginSlider');
const marginValue = document.getElementById('marginValue');

const qualitySlider = document.getElementById('qualitySlider');
const qualityValue = document.getElementById('qualityValue');

const compressToggle = document.getElementById('compressToggle');

const estimateSize = document.getElementById('estimateSize');

let uploadedImages = [];
let generatedPDF = null;

let currentPreviewPage = 0;

let selectedPages = new Set();

themeBtn.onclick = ()=>{

document.body.classList.toggle('light');

themeBtn.textContent =
document.body.classList.contains('light')
? '☾'
: '☀';

};

marginSlider.oninput = ()=>{

marginValue.textContent =
marginSlider.value;

renderLivePreview();

};

qualitySlider.oninput = ()=>{

qualityValue.textContent =
qualitySlider.value;

updateEstimate();

};

watermarkScale.oninput = ()=>{

scaleValue.textContent =
watermarkScale.value;

renderLivePreview();

};

watermarkOpacity.oninput = ()=>{

opacityValue.textContent =
watermarkOpacity.value;

renderLivePreview();

};

watermarkText.oninput =
renderLivePreview;

pageNumbers.onchange =
renderLivePreview;

fitMode.onchange =
renderLivePreview;

uploadBox.addEventListener('dragover',e=>{

e.preventDefault();

uploadBox.classList.add('dragover');

});

uploadBox.addEventListener('dragleave',()=>{

uploadBox.classList.remove('dragover');

});

uploadBox.addEventListener('drop',e=>{

e.preventDefault();

uploadBox.classList.remove('dragover');

processFiles(
Array.from(e.dataTransfer.files)
);

});

fileInput.addEventListener('change',e=>{

processFiles(
Array.from(e.target.files)
);

});

function processFiles(files){

files.forEach(file=>{

const reader = new FileReader();

reader.onload = e=>{

uploadedImages.push({

src:e.target.result,
rotation:0,
name:file.name

});

renderPreview();

};

reader.readAsDataURL(file);

});

}

function renderPreview(){

previewGrid.innerHTML = '';

if(uploadedImages.length === 0){

previewGrid.innerHTML = `
<div class="empty-state">
No images uploaded yet.
</div>
`;

renderLivePreview();

return;

}

uploadedImages.forEach((img,index)=>{

const div =
document.createElement('div');

div.className = 'preview-item';

div.innerHTML = `

<div class="page-badge">
${index + 1}
</div>

<div class="preview-actions">

<button
class="icon-btn rotate-btn"
data-index="${index}"
>
↻
</button>

<button
class="icon-btn delete-btn"
data-index="${index}"
>
×
</button>

</div>

<div class="select-box">

<input
type="checkbox"
class="select-checkbox"
data-index="${index}"
>

</div>

<div class="preview-sheet">

<img
src="${img.src}"
style="
transform:rotate(${img.rotation}deg)
"
>

</div>

<div class="preview-footer">

<small>${img.name}</small>

</div>

`;

previewGrid.appendChild(div);

});

attachEvents();

updateEstimate();

renderLivePreview();

}

function attachEvents(){

document
.querySelectorAll('.rotate-btn')
.forEach(btn=>{

btn.onclick = e=>{

e.stopPropagation();

const index =
Number(btn.dataset.index);

uploadedImages[index].rotation += 90;

const img =
btn.closest('.preview-item')
.querySelector('img');

img.style.transform =
`rotate(${uploadedImages[index].rotation}deg)`;

renderLivePreview();

};

});

document
.querySelectorAll('.delete-btn')
.forEach(btn=>{

btn.onclick = e=>{

e.stopPropagation();

const index =
Number(btn.dataset.index);

uploadedImages.splice(index,1);

renderPreview();

};

});

document
.querySelectorAll('.select-checkbox')
.forEach(box=>{

box.onchange = ()=>{

const index =
Number(box.dataset.index);

if(box.checked){

selectedPages.add(index);

}else{

selectedPages.delete(index);

}

};

});

}

document
.getElementById('rotateSelected')
.onclick = ()=>{

selectedPages.forEach(index=>{

uploadedImages[index].rotation += 90;

});

renderPreview();

};

document
.getElementById('deleteSelected')
.onclick = ()=>{

uploadedImages =
uploadedImages.filter((_,index)=>{

return !selectedPages.has(index);

});

selectedPages.clear();

renderPreview();

};

function updateEstimate(){

let totalBytes = 0;

uploadedImages.forEach(img=>{

totalBytes += img.src.length * 0.75;

});

totalBytes *= Number(
qualitySlider.value
);

if(compressToggle.checked){

totalBytes *= 0.65;

}

const mb =
(totalBytes / 1024 / 1024)
.toFixed(2);

estimateSize.textContent =
`${mb} MB`;

}

function renderLivePreview(){

if(uploadedImages.length === 0){

pdfPreview.innerHTML =
'Live Preview';

return;

}

const img =
uploadedImages[currentPreviewPage];

const fit =
fitMode.value;

const margin =
Number(marginSlider.value);

pdfPreview.innerHTML = `

<img
src="${img.src}"
style="
object-fit:
${fit === 'contain'
? 'contain'
: 'cover'};

padding:${margin}px;

transform:
rotate(${img.rotation}deg);
"
>

<div class="watermark-preview">

<span
style="
font-size:
${watermarkScale.value}px;

opacity:
${watermarkOpacity.value};
"
>
${watermarkText.value}
</span>

</div>

${
pageNumbers.checked
?
`
<div class="page-number-preview">
${currentPreviewPage + 1}
</div>
`
:
''
}

`;

}

prevPage.onclick = ()=>{

if(uploadedImages.length === 0)
return;

currentPreviewPage--;

if(currentPreviewPage < 0){

currentPreviewPage =
uploadedImages.length - 1;

}

renderLivePreview();

};

nextPage.onclick = ()=>{

if(uploadedImages.length === 0)
return;

currentPreviewPage++;

if(
currentPreviewPage >=
uploadedImages.length
){

currentPreviewPage = 0;

}

renderLivePreview();

};

new Sortable(previewGrid,{

animation:150,

onEnd:function(evt){

const moved =
uploadedImages.splice(
evt.oldIndex,
1
)[0];

uploadedImages.splice(
evt.newIndex,
0,
moved
);

renderPreview();

}

});

generateBtn.addEventListener(
'click',
async()=>{

if(uploadedImages.length === 0){

alert('Upload images first');

return;

}

spinnerOverlay.style.display =
'flex';

const { jsPDF } = window.jspdf;

const pdf = new jsPDF({

orientation:orientation.value,

unit:'mm',

format:pageSize.value

});

const margin =
Number(marginSlider.value);

const quality =
Number(qualitySlider.value);

const fit =
fitMode.value;

for(let i=0;i<uploadedImages.length;i++){

if(i !== 0){

pdf.addPage();

}

const image = uploadedImages[i];

const img = new Image();

img.src = image.src;

await new Promise(resolve=>{

img.onload = ()=>{

const canvas =
document.createElement('canvas');

const ctx =
canvas.getContext('2d');

let width = img.width;
let height = img.height;

if(
compressToggle.checked &&
width > 2200
){

width *= 0.7;
height *= 0.7;

}

canvas.width = width;
canvas.height = height;

ctx.save();

if(image.rotation !== 0){

canvas.width = height;
canvas.height = width;

ctx.translate(
canvas.width/2,
canvas.height/2
);

ctx.rotate(
image.rotation *
Math.PI/180
);

ctx.drawImage(
img,
-width/2,
-height/2,
width,
height
);

}else{

ctx.drawImage(
img,
0,
0,
width,
height
);

}

ctx.restore();

if(watermarkText.value){

ctx.save();

ctx.translate(canvas.width/2, canvas.height/2);
ctx.rotate(-35 * Math.PI / 180);

ctx.globalAlpha = Number(watermarkOpacity.value);
ctx.fillStyle = '#777';

ctx.font = `bold ${Number(watermarkScale.value) * 3}px Inter, Arial, sans-serif`;
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';

ctx.fillText(
watermarkText.value,
0,
0
);

ctx.restore();

}

const data =
canvas.toDataURL(
'image/jpeg',
quality
);

const pageWidth =
pdf.internal.pageSize.getWidth();

const pageHeight =
pdf.internal.pageSize.getHeight();

const availableWidth =
pageWidth - margin * 2;

const availableHeight =
pageHeight - margin * 2;

let ratio;

if(fit === 'contain'){

ratio = Math.min(
availableWidth /
canvas.width,

availableHeight /
canvas.height
);

}else{

ratio = Math.max(
availableWidth /
canvas.width,

availableHeight /
canvas.height
);

}

const finalWidth =
canvas.width * ratio;

const finalHeight =
canvas.height * ratio;

const x =
(pageWidth - finalWidth) / 2;

const y =
(pageHeight - finalHeight) / 2;

pdf.addImage(

data,
'JPEG',
x,
y,
finalWidth,
finalHeight

);

if(watermarkText.value){

const wmSize = Number(watermarkScale.value) / 2;

pdf.setFontSize(wmSize);

try{
pdf.setGState(new pdf.GState({
opacity:Number(watermarkOpacity.value)
}));
}catch(e){}

pdf.setTextColor(160);

pdf.text(
watermarkText.value,
pageWidth / 2,
pageHeight / 2,
{
align:'center',
angle:45
}
);

try{
pdf.setGState(new pdf.GState({opacity:1}));
}catch(e){}

}

if(pageNumbers.checked){

pdf.setFontSize(10);

pdf.setTextColor(120);

pdf.text(

`${i + 1}`,

pageWidth / 2,
pageHeight - 5,

{
align:'center'
}

);

}

resolve();

};

});

}

generatedPDF = pdf;

spinnerOverlay.style.display =
'none';

downloadBtn.style.display =
'block';

});

downloadBtn.onclick = ()=>{

if(generatedPDF){

generatedPDF.save(
'converted.pdf'
);

}

};


document.getElementById('closeAd').onclick=()=>{document.getElementById('bottomAd').style.display='none';};
</script>

</body>
</html>
